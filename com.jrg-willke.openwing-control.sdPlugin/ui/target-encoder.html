<!DOCTYPE html>
<html>

<head lang="en">
    <title>Target Encoder Settings</title>
    <meta charset="utf-8" />
    <style>
        body {
            color: #d8d8d8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13px;
            margin: 0;
            padding: 16px;
        }

        label {
            display: grid;
            gap: 6px;
            margin-bottom: 14px;
        }

        select,
        input {
            background: #2d2d2d;
            border: 1px solid #555;
            border-radius: 4px;
            color: #f0f0f0;
            font: inherit;
            min-height: 28px;
            padding: 4px 8px;
        }
    </style>
</head>

<body>
    <label>
        Target
        <select id="targetType">
            <option value="channel">Channel</option>
            <option value="main">Main</option>
        </select>
    </label>

    <label id="channelIndexLabel">
        Channel
        <select id="targetIndexSelect">
            <option value="1">1 – CH 1</option>
        </select>
    </label>

    <label id="targetIndexLabel">
        Index
        <input id="targetIndex" type="number" min="1" step="1" value="1" />
    </label>

    <label>
        Step dB
        <input id="stepDb" type="number" min="0.1" step="0.1" value="0.5" />
    </label>

    <script>
        const defaultSettings = {
            targetType: "channel",
            targetIndex: 1,
            stepDb: 0.5
        };

        const channelSummaryCount = 40;

        const controls = {
            targetType: document.getElementById("targetType"),
            targetIndexSelect: document.getElementById("targetIndexSelect"),
            targetIndex: document.getElementById("targetIndex"),
            channelIndexLabel: document.getElementById("channelIndexLabel"),
            targetIndexLabel: document.getElementById("targetIndexLabel"),
            stepDb: document.getElementById("stepDb")
        };

        let websocket;
        let propertyInspectorUuid;
        let settings = { ...defaultSettings };
        let channelSummaries = [];

        function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfo) {
            propertyInspectorUuid = uuid;
            websocket = new WebSocket(`ws://127.0.0.1:${port}`);

            websocket.addEventListener("open", () => {
                websocket.send(JSON.stringify({
                    event: registerEvent,
                    uuid
                }));

                const parsedActionInfo = JSON.parse(actionInfo);
                applySettings(parsedActionInfo.payload?.settings);
                requestSettings();
                requestChannelSummaries();
            });

            websocket.addEventListener("message", (event) => {
                const message = JSON.parse(event.data);

                if (message.event === "didReceiveSettings") {
                    applySettings(message.payload?.settings);
                }

                if (message.event === "sendToPropertyInspector") {
                    handlePluginMessage(message.payload);
                }
            });
        }

        function requestSettings() {
            websocket.send(JSON.stringify({
                event: "getSettings",
                context: propertyInspectorUuid
            }));
        }

        function requestChannelSummaries() {
            if (!websocket || websocket.readyState !== WebSocket.OPEN) {
                return;
            }

            websocket.send(JSON.stringify({
                event: "sendToPlugin",
                context: propertyInspectorUuid,
                payload: {
                    type: "openwing.requestChannelSummaries",
                    count: channelSummaryCount
                }
            }));
        }

        function persistSettings() {
            settings = readSettings();
            websocket.send(JSON.stringify({
                event: "setSettings",
                context: propertyInspectorUuid,
                payload: settings
            }));
        }

        function applySettings(nextSettings) {
            settings = {
                ...defaultSettings,
                ...nextSettings
            };

            controls.targetType.value = isTargetType(settings.targetType) ? settings.targetType : defaultSettings.targetType;
            controls.targetIndex.value = `${isPositiveInteger(settings.targetIndex) ? settings.targetIndex : defaultSettings.targetIndex}`;
            controls.stepDb.value = `${isStepDb(settings.stepDb) ? settings.stepDb : defaultSettings.stepDb}`;
            renderChannelOptions();
            updateIndexControlVisibility();
        }

        function readSettings() {
            const targetType = isTargetType(controls.targetType.value) ? controls.targetType.value : defaultSettings.targetType;
            const targetIndexControl = targetType === "channel" ? controls.targetIndexSelect : controls.targetIndex;
            const targetIndex = Number.parseInt(targetIndexControl.value, 10);
            const stepDb = Number.parseFloat(controls.stepDb.value);

            return {
                targetType,
                targetIndex: Number.isInteger(targetIndex) && targetIndex > 0 ? targetIndex : defaultSettings.targetIndex,
                stepDb: Number.isFinite(stepDb) && stepDb >= 0.1 ? stepDb : defaultSettings.stepDb
            };
        }

        function isTargetType(value) {
            return value === "channel" || value === "main";
        }

        function isPositiveInteger(value) {
            return Number.isInteger(value) && value > 0;
        }

        function isStepDb(value) {
            return typeof value === "number" && Number.isFinite(value) && value >= 0.1;
        }

        function handlePluginMessage(payload) {
            if (!payload || payload.type !== "openwing.channelSummaries" || !Array.isArray(payload.summaries)) {
                return;
            }

            channelSummaries = payload.summaries
                .map((summary) => ({
                    index: Number.parseInt(`${summary.index}`, 10),
                    name: typeof summary.name === "string" ? summary.name.trim() : ""
                }))
                .filter((summary) => Number.isInteger(summary.index) && summary.index > 0);

            renderChannelOptions();
        }

        function renderChannelOptions() {
            const selectedIndex = isPositiveInteger(settings.targetIndex) ? settings.targetIndex : defaultSettings.targetIndex;
            const summaries = [...channelSummaries];

            if (!summaries.some((summary) => summary.index === selectedIndex)) {
                summaries.push({
                    index: selectedIndex,
                    name: `CH ${selectedIndex}`
                });
            }

            summaries.sort((left, right) => left.index - right.index);
            controls.targetIndexSelect.replaceChildren(...summaries.map((summary) => {
                const option = document.createElement("option");
                const name = summary.name.length > 0 ? summary.name : `CH ${summary.index}`;
                option.value = `${summary.index}`;
                option.textContent = `${summary.index} – ${name}`;
                return option;
            }));
            controls.targetIndexSelect.value = `${selectedIndex}`;
        }

        function updateIndexControlVisibility() {
            const isChannel = controls.targetType.value === "channel";
            controls.channelIndexLabel.style.display = isChannel ? "grid" : "none";
            controls.targetIndexLabel.style.display = isChannel ? "none" : "grid";
        }

        controls.targetType.addEventListener("change", () => {
            updateIndexControlVisibility();
            requestChannelSummaries();
            persistSettings();
        });
        controls.targetIndexSelect.addEventListener("change", persistSettings);
        controls.targetIndex.addEventListener("change", persistSettings);
        controls.stepDb.addEventListener("change", persistSettings);
    </script>
</body>

</html>
